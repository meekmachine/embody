name: Continuous Release (pkg.pr.new)

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: pkg-pr-new-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  publish:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish preview package
        id: publish
        continue-on-error: true
        run: npx --yes pkg-pr-new publish --no-compact

      - name: Warn if pkg.pr.new is unavailable
        if: steps.publish.outcome == 'failure'
        run: |
          echo "::warning::pkg.pr.new publish failed. Install the GitHub App at https://github.com/apps/pkg-pr-new on meekmachine/embody, then re-run this job. Consumers will fall back to git SHA installs until then."
