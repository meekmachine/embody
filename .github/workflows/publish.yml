name: Publish Embody to NPM

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: "${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}"
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: "${{ github.ref_name }}"
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Verify release push token
        env:
          PUBLISH_PUSH_TOKEN: ${{ secrets.PUBLISH_PUSH_TOKEN }}
        run: |
          if [ -z "${PUBLISH_PUSH_TOKEN}" ]; then
            echo "PUBLISH_PUSH_TOKEN is not configured."
            exit 1
          fi

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure git push auth
        env:
          PUBLISH_PUSH_TOKEN: ${{ secrets.PUBLISH_PUSH_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${PUBLISH_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Install dependencies
        run: npm ci

      - name: Verify NPM auth
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_KEY is not configured for this workflow environment."
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}

      - name: Determine release version
        id: release
        run: |
          node <<'EOF'
          const { execSync } = require('child_process');
          const fs = require('fs');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const outputPath = process.env.GITHUB_OUTPUT;

          const currentVersion = pkg.version;
          const releaseTag = execSync("git tag --points-at HEAD --list 'v*'", { encoding: 'utf8' })
            .trim()
            .split('\n')
            .filter(Boolean)[0];

          function parse(version) {
            const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(version);
            if (!match) {
              throw new Error(`Unsupported semver: ${version}`);
            }
            return match.slice(1).map(Number);
          }

          function compare(a, b) {
            const left = parse(a);
            const right = parse(b);
            for (let i = 0; i < 3; i += 1) {
              if (left[i] !== right[i]) {
                return left[i] - right[i];
              }
            }
            return 0;
          }

          function bumpPatch(version) {
            const [major, minor, patch] = parse(version);
            return `${major}.${minor}.${patch + 1}`;
          }

          let version;
          let existingTag = 'false';
          let publishedVersion = '';

          if (releaseTag) {
            version = releaseTag.replace(/^v/, '');
            existingTag = 'true';
          } else {
            try {
              publishedVersion = execSync(`npm view "${pkg.name}" version`, {
                encoding: 'utf8',
                stdio: ['ignore', 'pipe', 'ignore'],
              }).trim();
            } catch (_error) {
              publishedVersion = '';
            }

            const baseVersion =
              publishedVersion && compare(publishedVersion, currentVersion) > 0
                ? publishedVersion
                : currentVersion;
            version = bumpPatch(baseVersion);
          }

          execSync(`npm version ${version} --no-git-tag-version`, { stdio: 'inherit' });

          const lines = [
            `package_name=${pkg.name}`,
            `version=${version}`,
            `tag=v${version}`,
            `existing_tag=${existingTag}`,
            `published_version=${publishedVersion}`,
            `release_commit=${execSync('git rev-parse HEAD', { encoding: 'utf8' }).trim()}`,
          ];
          fs.appendFileSync(outputPath, `${lines.join('\n')}\n`);
          EOF

      - name: Build
        run: npm run build

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Check if version already exists on NPM
        id: existing
        run: |
          if npm view "${{ steps.release.outputs.package_name }}@${{ steps.release.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.release.outputs.version }} is already published."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.release.outputs.version }} is not published yet."
          fi

      - name: Ensure release tag exists
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          remote_sha="$(git ls-remote --tags origin "refs/tags/${TAG}^{}" | awk '{print $1}')"
          head_sha="$(git rev-parse HEAD)"
          if [ -n "${remote_sha}" ] && [ "${remote_sha}" != "${head_sha}" ]; then
            echo "Tag ${TAG} already exists on ${remote_sha}, expected ${head_sha}."
            exit 1
          fi
          if [ -z "${remote_sha}" ]; then
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "refs/tags/${TAG}"
          fi

      - name: Publish to NPM
        if: steps.existing.outputs.exists != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}

      - name: Create or update GitHub release
        if: ${{ steps.existing.outputs.exists == 'true' || success() }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --title "${TAG}" --notes "Published ${{ steps.release.outputs.package_name }} ${VERSION}"
          else
            gh release create "${TAG}" --target "${GITHUB_SHA}" --title "${TAG}" --notes "Published ${{ steps.release.outputs.package_name }} ${VERSION}"
          fi
